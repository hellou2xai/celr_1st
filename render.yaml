# Render blueprint for the CELR Procurement React + FastAPI demo.
#
# One service serves three things:
#   - React SPA (built by `npm run build` into frontend/dist)
#   - JSON API at /api/*
#   - MCP server at /mcp/
#
# The seed step (Postgres bootstrap) runs as preDeployCommand and is
# idempotent via the seed_marker table.

services:
  - type: web
    name: celr-procurement
    runtime: python
    plan: starter
    region: oregon
    branch: main
    rootDir: .
    buildCommand: |
      set -euo pipefail
      curl -fsSL https://nodejs.org/dist/v20.18.0/node-v20.18.0-linux-x64.tar.xz | tar -xJ
      export PATH="$PWD/node-v20.18.0-linux-x64/bin:$PATH"
      cd frontend
      npm ci
      npm run build
      cd ..
      pip install --upgrade pip
      pip install -r requirements.txt
    preDeployCommand: python -m seed.seed
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT --workers 2
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: celr-procurement-db
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: SYNTH_YEARS
        value: 4
      - key: SYNTH_SEED
        value: 20260518
      # Set to 100 if using basic-256mb DB plan to fit data into 256MB.
      # Set to 0 (no cap) once you've upgraded to basic-1gb or larger.
      - key: SYNTH_DAY_TXN_CAP
        value: 100
      - key: RENDER
        value: "true"

      # Auth — flip when you wire up Resend.
      - key: AUTH_ALLOWED_EMAILS
        value: hello@u2xai.com
      - key: AUTH_ALLOWED_DOMAINS
        value: ""
      - key: AUTH_EMAIL_PROVIDER
        value: none   # set to "resend" after configuring RESEND_API_KEY
      - key: AUTH_SECRET
        generateValue: true   # 256-bit random, regenerated per env
      # - key: RESEND_API_KEY
      #   sync: false
      # - key: RESEND_FROM
      #   value: "CELR <noreply@u2xai.com>"
      # - key: PUBLIC_URL
      #   value: https://celr-procurement.onrender.com

databases:
  # Render's current Postgres plan names use hyphens (not underscores).
  # Valid options (2025):
  #   free          — 1GB, $0, expires after 90 days. Fine for trying it out.
  #   basic-256mb   — ~$7/mo, 256MB disk. Tight for 4yr of data; pair with
  #                   SYNTH_DAY_TXN_CAP=100 to fit.
  #   basic-1gb     — ~$19/mo, 1GB disk. Fits full 4yr seed at real volume.
  #   basic-4gb     — ~$45/mo, 4GB.
  #   pro-4gb       — ~$95/mo, 4GB with higher CPU/RAM.
  # If basic-256mb fills up during seed, bump to basic-1gb in the Render
  # dashboard (Database → Settings → Plan) — no code change needed.
  - name: celr-procurement-db
    plan: basic-256mb
    databaseName: celr_procurement
    user: celr
    region: oregon
    postgresMajorVersion: 16
    ipAllowList: []
