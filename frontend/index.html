<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CELR Procurement</title>
    <!-- Apply stored theme before the React bundle loads so we never flash
         the wrong theme. Mirrors the logic in components/ThemeToggle.tsx. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem("celr_theme");
          if (t === "dark") document.documentElement.classList.add("dark");
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="bg-bg text-fg antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
